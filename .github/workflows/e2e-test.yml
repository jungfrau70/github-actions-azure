# LTM Korea Azure SA Workshop — End-to-End Automation Test
#
# Scope: Delete existing infrastructure → Rebuild from scratch → Verify app serving via LB
#
# What this workflow proves:
#   1. Full infrastructure-as-code (Bicep) deployment is reproducible
#   2. Azure Bastion provides Zero Trust admin access (no internet-facing SSH)
#   3. Jumpbox pattern enables internal VM-to-VM management
#   4. Break-glass: az vm run-command bypasses network restrictions via Management Plane
#
# ── Infrastructure provisioning strategy (hybrid) ───────────────────────────
#
#   az CLI  — one-time, environment-scoped resources (created once per environment):
#               RG, VNet, NSG, Bastion, Jumpbox VM, VM-1
#             Rationale: these are topology/security boundaries that rarely change.
#             az CLI keeps them explicit, auditable line-by-line, and easy to debug.
#
#   Bicep   — reusable application-tier module (lb-vm2.bicep):
#               Standard LB + VM-2 NIC + VM-2
#             Rationale: the LB+VM bundle is a repeatable pattern that may be
#             deployed multiple times (different regions, environments). Bicep
#             provides idempotency (what-if), parameter typing, and output contracts.
#
#   This split mirrors real-world practice:
#     "Network/security topology → CLI or Portal (ops team owns it)"
#     "Application-tier IaC module → Bicep/Terraform (dev team re-uses it)"
#
# ── Required GitHub Secrets ─────────────────────────────────────────────────
#   AZURE_CREDENTIALS  — az ad sp create-for-rbac --sdk-auth JSON
#   ADMIN_PASSWORD     — VM admin password
#
# Trigger: manual only (workflow_dispatch) for safety

name: E2E Test — Full Fresh Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "DESTROY" to confirm deletion of ltmsa-security-rg'
        required: true
        default: ''
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, production]

env:
  AZURE_RG:       ltmsa-security-rg
  AZURE_LOCATION: koreacentral
  # ── Hub VNet (Bastion + Jumpbox — shared services) ───────────────
  HUB_VNET_NAME:   ltmsa-hub-vnet
  HUB_VNET_PREFIX: 10.0.0.0/16
  # AzureBastionSubnet: required name, min /26, NO NSG allowed
  BASTION_NAME:    ltmsa-bastion
  BASTION_PREFIX:  10.0.0.0/26
  # mgmt-snet: Jumpbox VM (no public IP, SSH from Bastion only)
  MGMT_SUBNET:     mgmt-snet
  MGMT_PREFIX:     10.0.1.0/24
  MGMT_NSG:        ltmsa-mgmt-nsg
  JUMPBOX_VM:      ltmsa-jumpbox
  JUMPBOX_SIZE:    Standard_D2s_v3  # B2s/DS2v2 unavailable in KoreaCentral; D2s_v3 confirmed available
  # ── Spoke VNet (App VMs + LB — workload tier) ────────────────────
  SPOKE_VNET_NAME:   ltmsa-spoke-vnet
  SPOKE_VNET_PREFIX: 10.1.0.0/16
  # web-snet: App VMs (SSH via Hub Bastion/Jumpbox through VNet Peering — no internet SSH)
  WEB_SUBNET:     web-snet
  WEB_PREFIX:     10.1.1.0/24
  NSG_NAME:       ltmsa-web-nsg
  AZURE_VM1:      ltmsa-demo-vm
  AZURE_VM2:      ltmsa-demo-vm-2
  AZURE_LB:       ltmsa-lb
  VM_SIZE:        Standard_D2s_v3
  VM_IMAGE_URN:   Canonical:0001-com-ubuntu-server-jammy:22_04-lts-gen2:latest
  APP_DIR:        /opt/ltm-workshop
  APP_PORT:       3000
  NODE_VER:       "18"

jobs:
  # ── Gate: safety check ─────────────────────────────────────────────
  preflight:
    name: "Preflight — Safety Gate"
    runs-on: ubuntu-latest
    steps:
      - name: Validate destroy confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: confirm_destroy must be 'DESTROY' to proceed."
            echo "Input was: '${{ github.event.inputs.confirm_destroy }}'"
            exit 1
          fi
          echo "Destroy confirmed. Proceeding with full E2E test."

  # ── 1. Cleanup: delete resource group ──────────────────────────────
  cleanup:
    name: "Step 1 — Delete ltmsa-security-rg"
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete resource group
        run: |
          EXISTS=$(az group exists --name ${{ env.AZURE_RG }})
          if [ "$EXISTS" != "true" ]; then
            echo "${{ env.AZURE_RG }} does not exist — skip"
            exit 0
          fi

          # Remove all Resource Locks first — az group delete fails silently with --no-wait if locked
          LOCKS=$(az lock list --resource-group ${{ env.AZURE_RG }} --query "[].name" -o tsv 2>/dev/null || true)
          if [ -n "$LOCKS" ]; then
            echo "Found locks — removing before deletion:"
            while IFS= read -r lock; do
              echo "  Removing lock: $lock"
              az lock delete --name "$lock" --resource-group ${{ env.AZURE_RG }}
            done <<< "$LOCKS"
          fi

          echo "Deleting ${{ env.AZURE_RG }} ..."
          az group delete --name ${{ env.AZURE_RG }} --yes --no-wait

          # Bastion deletion alone can take 15-20 min — wait up to 30 min total
          echo "Waiting for deletion (up to 30 min)..."
          for i in $(seq 1 60); do
            sleep 30
            STILL=$(az group exists --name ${{ env.AZURE_RG }})
            echo "[$i/60] Exists: $STILL"
            if [ "$STILL" == "false" ]; then
              echo "Resource group deleted."
              exit 0
            fi
          done

          echo "ERROR: ${{ env.AZURE_RG }} still exists after 30 min — check for remaining locks or dependencies"
          exit 1

      - name: Azure logout
        if: always()
        run: az logout

  # ── 2. Network: Hub-Spoke VNets + NSGs + Peering + Bastion ──────────
  setup-network:
    name: "Step 2 — Hub-Spoke VNet + NSG + Peering + Bastion"
    runs-on: ubuntu-latest
    needs: cleanup
    outputs:
      spoke_subnet_id: ${{ steps.subnets.outputs.spoke_subnet_id }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RG }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags Environment=${{ github.event.inputs.environment }} \
                   Project=LTM-SA-Workshop \
                   ManagedBy=GitHubActions

      - name: Create NSGs
        run: |
          # ── Spoke web-snet NSG (App VMs) ─────────────────────────
          # Source IPs are from Hub VNet — traffic arrives through VNet Peering
          az network nsg create --resource-group ${{ env.AZURE_RG }} --name ${{ env.NSG_NAME }}

          # SSH from Hub AzureBastionSubnet (Bastion reaches Spoke VMs via peering)
          az network nsg rule create \
            --resource-group ${{ env.AZURE_RG }} --nsg-name ${{ env.NSG_NAME }} \
            --name allow-bastion-ssh --priority 100 --protocol Tcp \
            --source-address-prefixes ${{ env.BASTION_PREFIX }} \
            --destination-port-ranges 22 --access Allow

          # SSH from Hub mgmt-snet Jumpbox (Jumpbox → Spoke VMs via peering)
          az network nsg rule create \
            --resource-group ${{ env.AZURE_RG }} --nsg-name ${{ env.NSG_NAME }} \
            --name allow-jumpbox-ssh --priority 110 --protocol Tcp \
            --source-address-prefixes ${{ env.MGMT_PREFIX }} \
            --destination-port-ranges 22 --access Allow

          # App port 3000 (LB health probe + internet direct)
          az network nsg rule create \
            --resource-group ${{ env.AZURE_RG }} --nsg-name ${{ env.NSG_NAME }} \
            --name allow-app-3000 --priority 200 --protocol Tcp \
            --destination-port-ranges ${{ env.APP_PORT }} --access Allow

          # HTTP 80 (Load Balancer frontend)
          az network nsg rule create \
            --resource-group ${{ env.AZURE_RG }} --nsg-name ${{ env.NSG_NAME }} \
            --name allow-http --priority 210 --protocol Tcp \
            --destination-port-ranges 80 --access Allow

          # AzureLoadBalancer health probes
          az network nsg rule create \
            --resource-group ${{ env.AZURE_RG }} --nsg-name ${{ env.NSG_NAME }} \
            --name allow-lb-probe --priority 300 --protocol Tcp \
            --source-address-prefixes AzureLoadBalancer \
            --destination-port-ranges "*" --access Allow

          # ── Hub mgmt-snet NSG (Jumpbox) ───────────────────────────
          az network nsg create --resource-group ${{ env.AZURE_RG }} --name ${{ env.MGMT_NSG }}

          # Jumpbox: SSH inbound from Bastion only
          az network nsg rule create \
            --resource-group ${{ env.AZURE_RG }} --nsg-name ${{ env.MGMT_NSG }} \
            --name allow-bastion-to-jumpbox --priority 100 --protocol Tcp \
            --source-address-prefixes ${{ env.BASTION_PREFIX }} \
            --destination-port-ranges 22 --access Allow

          # Jumpbox: SSH outbound to Spoke web-snet (explicit for auditability)
          # Azure default AllowVnetOutBound covers peered VNets; this rule makes
          # the intent reviewable in compliance/policy tools
          az network nsg rule create \
            --resource-group ${{ env.AZURE_RG }} --nsg-name ${{ env.MGMT_NSG }} \
            --name allow-jumpbox-to-spoke --priority 200 --protocol Tcp \
            --direction Outbound \
            --source-address-prefixes ${{ env.MGMT_PREFIX }} \
            --destination-address-prefixes ${{ env.WEB_PREFIX }} \
            --destination-port-ranges 22 --access Allow

      - name: Create Hub VNet + subnets
        run: |
          # Hub VNet — shared services: Bastion + Jumpbox
          az network vnet create \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.HUB_VNET_NAME }} \
            --address-prefix ${{ env.HUB_VNET_PREFIX }} \
            --subnet-name AzureBastionSubnet \
            --subnet-prefix ${{ env.BASTION_PREFIX }}
          echo "Hub VNet created: ${{ env.HUB_VNET_NAME }} (${{ env.HUB_VNET_PREFIX }})"

          # mgmt-snet in Hub: Jumpbox VM (Bastion-only access, no public IP)
          az network vnet subnet create \
            --resource-group ${{ env.AZURE_RG }} \
            --vnet-name ${{ env.HUB_VNET_NAME }} \
            --name ${{ env.MGMT_SUBNET }} \
            --address-prefix ${{ env.MGMT_PREFIX }} \
            --network-security-group ${{ env.MGMT_NSG }}
          echo "Hub mgmt-snet created: ${{ env.MGMT_PREFIX }}"

      - name: Create Spoke VNet + subnets
        id: subnets
        run: |
          # Spoke VNet — workload tier: App VMs + LB
          az network vnet create \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.SPOKE_VNET_NAME }} \
            --address-prefix ${{ env.SPOKE_VNET_PREFIX }}
          echo "Spoke VNet created: ${{ env.SPOKE_VNET_NAME }} (${{ env.SPOKE_VNET_PREFIX }})"

          # web-snet in Spoke: App VMs (SSH via Hub Bastion/Jumpbox through peering)
          az network vnet subnet create \
            --resource-group ${{ env.AZURE_RG }} \
            --vnet-name ${{ env.SPOKE_VNET_NAME }} \
            --name ${{ env.WEB_SUBNET }} \
            --address-prefix ${{ env.WEB_PREFIX }} \
            --network-security-group ${{ env.NSG_NAME }}
          echo "Spoke web-snet created: ${{ env.WEB_PREFIX }}"

          SPOKE_SUBNET_ID=$(az network vnet subnet show \
            --resource-group ${{ env.AZURE_RG }} \
            --vnet-name ${{ env.SPOKE_VNET_NAME }} \
            --name ${{ env.WEB_SUBNET }} \
            --query id --output tsv)
          echo "spoke_subnet_id=$SPOKE_SUBNET_ID" >> $GITHUB_OUTPUT
          echo "Spoke web-snet ID: $SPOKE_SUBNET_ID"

      - name: Create VNet Peering (Hub ↔ Spoke)
        run: |
          HUB_ID=$(az network vnet show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.HUB_VNET_NAME }} \
            --query id --output tsv)
          SPOKE_ID=$(az network vnet show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.SPOKE_VNET_NAME }} \
            --query id --output tsv)

          # Hub → Spoke peering (allows Bastion/Jumpbox to reach Spoke workloads)
          az network vnet peering create \
            --resource-group ${{ env.AZURE_RG }} \
            --name hub-to-spoke \
            --vnet-name ${{ env.HUB_VNET_NAME }} \
            --remote-vnet "$SPOKE_ID" \
            --allow-vnet-access true \
            --allow-forwarded-traffic true
          echo "Peering Hub→Spoke created"

          # Spoke → Hub peering (allows return traffic + Spoke to reach Hub services)
          az network vnet peering create \
            --resource-group ${{ env.AZURE_RG }} \
            --name spoke-to-hub \
            --vnet-name ${{ env.SPOKE_VNET_NAME }} \
            --remote-vnet "$HUB_ID" \
            --allow-vnet-access true \
            --allow-forwarded-traffic true
          echo "Peering Spoke→Hub created"

          echo "VNet Peering established: Hub (${{ env.HUB_VNET_PREFIX }}) ↔ Spoke (${{ env.SPOKE_VNET_PREFIX }})"

      - name: Deploy Azure Bastion in Hub (async)
        run: |
          # Standard Static zone-redundant Public IP for Bastion (in Hub VNet)
          az network public-ip create \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.BASTION_NAME }}-pip \
            --sku Standard --allocation-method Static \
            --zone 1 2 3

          # Basic SKU Bastion in Hub AzureBastionSubnet
          # Bastion reaches Spoke VMs through VNet Peering (no public SSH needed on Spoke VMs)
          # --no-wait: continues in background while VMs are created in parallel
          az network bastion create \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.BASTION_NAME }} \
            --public-ip-address ${{ env.BASTION_NAME }}-pip \
            --vnet-name ${{ env.HUB_VNET_NAME }} \
            --sku Basic \
            --no-wait
          echo "Bastion provisioning started in Hub (async) — verified in Step 6"

      - name: Azure logout
        if: always()
        run: az logout

  # ── 3a. Jumpbox VM (Hub mgmt-snet, no public IP) ──────────────────
  setup-jumpbox:
    name: "Step 3a — Jumpbox VM (Hub)"
    runs-on: ubuntu-latest
    needs: setup-network
    outputs:
      jumpbox_private_ip: ${{ steps.jumpbox.outputs.jumpbox_ip }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Jumpbox VM in Hub mgmt-snet
        id: jumpbox
        run: |
          # Jumpbox lives in Hub VNet (mgmt-snet) — no public IP
          # Access path: Bastion (Hub AzureBastionSubnet) → Jumpbox (Hub mgmt-snet)
          #              → SSH → App VMs (Spoke web-snet) via VNet Peering
          az vm create \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.JUMPBOX_VM }} \
            --location ${{ env.AZURE_LOCATION }} \
            --image ${{ env.VM_IMAGE_URN }} \
            --size ${{ env.JUMPBOX_SIZE }} \
            --admin-username azureuser \
            --admin-password "${{ secrets.ADMIN_PASSWORD }}" \
            --authentication-type password \
            --vnet-name ${{ env.HUB_VNET_NAME }} \
            --subnet ${{ env.MGMT_SUBNET }} \
            --nsg "" \
            --public-ip-address "" \
            --tags Project=LTM-SA-Workshop VM=jumpbox Role=management VNet=Hub

          JUMPBOX_IP=$(az vm show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.JUMPBOX_VM }} \
            --show-details --query privateIps --output tsv)
          echo "jumpbox_ip=$JUMPBOX_IP" >> $GITHUB_OUTPUT
          echo "Jumpbox private IP: $JUMPBOX_IP (no public IP — Bastion access only)"

      - name: Azure logout
        if: always()
        run: az logout

  # ── 3b. Compute: VM-1 (Spoke web-snet) ────────────────────────────
  setup-vm1:
    name: "Step 3b — Create VM-1 (Spoke)"
    runs-on: ubuntu-latest
    needs: setup-network
    outputs:
      vm1_ip: ${{ steps.vm1.outputs.vm1_ip }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create VM-1 in Spoke web-snet
        id: vm1
        run: |
          # cloud-init: pre-install Node.js + pm2 at boot time
          # Runs before unattended-upgrades acquires dpkg lock → no apt race condition
          cat > /tmp/cloud-init.yaml << 'CLOUDINIT'
          #cloud-config
          runcmd:
            - systemctl disable unattended-upgrades --now || true
            - curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
            - apt-get install -y nodejs
            - npm install -g pm2
            - env PATH=$PATH:/usr/bin pm2 startup systemd -u root --hp /root
            - systemctl enable pm2-root
            - mkdir -p /opt/ltm-workshop
            - chown azureuser:azureuser /opt/ltm-workshop
          CLOUDINIT

          # App VM in Spoke VNet (web-snet) — workload tier
          # SSH access: Bastion (Hub) → via VNet Peering → VM (Spoke)
          az vm create \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_VM1 }} \
            --location ${{ env.AZURE_LOCATION }} \
            --image ${{ env.VM_IMAGE_URN }} \
            --size ${{ env.VM_SIZE }} \
            --admin-username azureuser \
            --admin-password "${{ secrets.ADMIN_PASSWORD }}" \
            --authentication-type password \
            --vnet-name ${{ env.SPOKE_VNET_NAME }} \
            --subnet ${{ env.WEB_SUBNET }} \
            --nsg "" \
            --public-ip-sku Standard \
            --custom-data /tmp/cloud-init.yaml \
            --tags Project=LTM-SA-Workshop VM=primary VNet=Spoke

          VM1_IP=$(az vm show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_VM1 }} \
            --show-details --query publicIps --output tsv)
          echo "vm1_ip=$VM1_IP" >> $GITHUB_OUTPUT
          echo "VM-1 IP: $VM1_IP"

      - name: Azure logout
        if: always()
        run: az logout

  # ── 4. IaC: lb-vm2.bicep (LB + VM-2) ──────────────────────────────────
  setup-lb:
    name: "Step 4 — Bicep: LB + VM-2"
    runs-on: ubuntu-latest
    needs: [setup-network, setup-vm1]
    outputs:
      lb_ip: ${{ steps.bicep.outputs.lb_ip }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy lb-vm2.bicep (Spoke web-snet)
        id: bicep
        run: |
          # Same cloud-init as VM-1: Node.js + pm2 pre-installed at VM-2 boot
          cat > /tmp/cloud-init.yaml << 'CLOUDINIT'
          #cloud-config
          runcmd:
            - systemctl disable unattended-upgrades --now || true
            - curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
            - apt-get install -y nodejs
            - npm install -g pm2
            - env PATH=$PATH:/usr/bin pm2 startup systemd -u root --hp /root
            - systemctl enable pm2-root
            - mkdir -p /opt/ltm-workshop
            - chown azureuser:azureuser /opt/ltm-workshop
          CLOUDINIT
          CUSTOM_DATA_B64=$(base64 -w0 /tmp/cloud-init.yaml)

          RESULT=$(az deployment group create \
            --resource-group ${{ env.AZURE_RG }} \
            --template-file bicep/lb-vm2.bicep \
            --parameters adminPassword="${{ secrets.ADMIN_PASSWORD }}" \
                         subnetId="${{ needs.setup-network.outputs.spoke_subnet_id }}" \
                         customData="$CUSTOM_DATA_B64" \
            --query properties.outputs \
            --output json)

          LB_IP=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['lbPublicIp']['value'])")
          echo "lb_ip=$LB_IP" >> $GITHUB_OUTPUT
          echo "LB IP: $LB_IP"

      - name: Add VM-1 NIC to LB backend pool
        run: |
          NIC_NAME=$(az vm show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_VM1 }} \
            --query "networkProfile.networkInterfaces[0].id" \
            --output tsv | xargs basename)

          # Azure-created VMs use dynamic ip-config names (e.g. "ipconfigltmsa-demo-vm"), not "ipconfig1"
          IP_CONFIG=$(az network nic show \
            --resource-group ${{ env.AZURE_RG }} \
            --name "$NIC_NAME" \
            --query "ipConfigurations[0].name" \
            --output tsv)

          BACKEND_POOL_ID=$(az network lb show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_LB }} \
            --query "backendAddressPools[0].id" \
            --output tsv)

          echo "Adding VM-1: NIC=$NIC_NAME, IPConfig=$IP_CONFIG"
          az network nic ip-config address-pool add \
            --resource-group ${{ env.AZURE_RG }} \
            --nic-name "$NIC_NAME" \
            --ip-config-name "$IP_CONFIG" \
            --address-pool "$BACKEND_POOL_ID"
          echo "VM-1 added to LB backend pool"

      - name: Azure logout
        if: always()
        run: az logout

  # ── 5. App: deploy to both VMs ────────────────────────────────────
  deploy-app:
    name: "Step 5 — App: ${{ matrix.vm }}"
    runs-on: ubuntu-latest
    needs: [setup-lb]
    strategy:
      fail-fast: false
      matrix:
        vm: [ltmsa-demo-vm, ltmsa-demo-vm-2]

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prepare deployment package
        id: pkg
        run: |
          echo "app_b64=$(base64 -w0 src/app.js)" >> $GITHUB_OUTPUT
          echo "pkg_b64=$(base64 -w0 package.json)" >> $GITHUB_OUTPUT
          echo "app_version=$(node -p "require('./package.json').version")-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy app to ${{ matrix.vm }}
        run: |
          APP_B64="${{ steps.pkg.outputs.app_b64 }}"
          PKG_B64="${{ steps.pkg.outputs.pkg_b64 }}"
          APP_VERSION="${{ steps.pkg.outputs.app_version }}"
          APP_DIR="${{ env.APP_DIR }}"
          APP_PORT="${{ env.APP_PORT }}"

          az vm run-command invoke \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ matrix.vm }} \
            --command-id RunShellScript \
            --scripts "
              set -e
              # Node.js + pm2 pre-installed by cloud-init at VM boot — no apt needed here
              # Wait for cloud-init to finish (covers the case where VM just booted)
              sudo cloud-init status --wait 2>/dev/null || true
              echo 'cloud-init done. Node:' \$(node --version) 'pm2:' \$(pm2 --version)
              sudo mkdir -p ${APP_DIR}
              sudo chown azureuser:azureuser ${APP_DIR}
              cd ${APP_DIR}
              echo '${APP_B64}' | base64 -d > app.js
              echo '${PKG_B64}' | base64 -d > package.json
              npm install --production --silent
              if pm2 describe ltm-workshop &>/dev/null; then
                pm2 restart ltm-workshop --update-env
              else
                PORT=${APP_PORT} APP_VERSION=${APP_VERSION} \
                  pm2 start app.js --name ltm-workshop
              fi
              pm2 save --force
              # enable pm2-root for reboot persistence — do NOT restart (ExecStop runs pm2 kill which would kill our app)
              systemctl enable pm2-root 2>/dev/null || true
              for i in \$(seq 1 6); do
                sleep 5
                if curl -sf --max-time 10 http://localhost:${APP_PORT}/health >/dev/null; then
                  echo \"[OK] ${{ matrix.vm }} healthy (attempt \${i}/6)\"
                  exit 0
                fi
              done
              echo 'Health check failed'
              exit 1
            " \
            --query "value[0].message" \
            --output tsv

      - name: Azure logout
        if: always()
        run: az logout

  # ── 6. Verify: LB + Bastion + Break-glass ─────────────────────────
  verify:
    name: "Step 6 — Verify: LB + Bastion + Break-glass"
    runs-on: ubuntu-latest
    needs: [setup-jumpbox, setup-vm1, setup-lb, deploy-app]

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Scenario 1 — Wait for LB health probe
        run: |
          LB_IP="${{ needs.setup-lb.outputs.lb_ip }}"
          echo "Waiting for LB at http://${LB_IP}/health ..."
          for i in $(seq 1 18); do
            sleep 10
            if curl -sf --max-time 10 "http://${LB_IP}/health" >/dev/null 2>&1; then
              echo "LB is healthy (attempt ${i}/18)"
              break
            fi
            echo "Waiting... (${i}/18)"
          done

      - name: Scenario 1 — LB health check
        run: |
          LB_IP="${{ needs.setup-lb.outputs.lb_ip }}"
          echo "=== LB Health ==="
          curl -sf "http://${LB_IP}/health" | python3 -m json.tool
          echo ""
          echo "=== API Modules ==="
          curl -sf "http://${LB_IP}/api/modules" | python3 -m json.tool
          echo ""
          echo "=== API Status ==="
          curl -sf "http://${LB_IP}/api/status" | python3 -m json.tool

      - name: Scenario 2 — Verify Bastion provisioning (Hub VNet)
        run: |
          echo "Checking Azure Bastion state in Hub VNet (max 15 min)..."
          BASTION_READY=false
          for i in $(seq 1 30); do
            STATE=$(az network bastion show \
              --resource-group ${{ env.AZURE_RG }} \
              --name ${{ env.BASTION_NAME }} \
              --query "provisioningState" --output tsv 2>/dev/null || echo "Pending")
            echo "[${i}/30] Bastion state: $STATE"
            if [ "$STATE" = "Succeeded" ]; then
              BASTION_IP=$(az network public-ip show \
                --resource-group ${{ env.AZURE_RG }} \
                --name ${{ env.BASTION_NAME }}-pip \
                --query ipAddress --output tsv)
              echo "Bastion ready in Hub — Public IP: $BASTION_IP"
              echo "Admin access path (Hub-Spoke):"
              echo "  Portal → Bastion (Hub AzureBastionSubnet ${{ env.BASTION_PREFIX }})"
              echo "         → [VNet Peering] → App VMs (Spoke web-snet ${{ env.WEB_PREFIX }})"
              echo "  OR: Bastion → Jumpbox (Hub mgmt-snet ${{ env.MGMT_PREFIX }}) → SSH → App VMs"
              BASTION_READY=true
              break
            fi
            if [ "$STATE" = "Failed" ]; then
              echo "ERROR: Bastion provisioning failed"
              exit 1
            fi
            sleep 30
          done
          if [ "$BASTION_READY" = "false" ]; then
            echo "ERROR: Bastion did not reach Succeeded within 15 min"
            exit 1
          fi

      - name: Scenario 2 — Verify Jumpbox (no public IP)
        run: |
          JUMPBOX_IP="${{ needs.setup-jumpbox.outputs.jumpbox_private_ip }}"
          STATE=$(az vm get-instance-view \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.JUMPBOX_VM }} \
            --query "instanceView.statuses[?starts_with(code,'PowerState')].displayStatus" \
            --output tsv)
          PUBLIC_IP=$(az vm show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.JUMPBOX_VM }} \
            --show-details --query publicIps --output tsv 2>/dev/null || echo "none")
          echo "Jumpbox VM: $STATE | Private IP: ${JUMPBOX_IP} | Public IP: ${PUBLIC_IP:-none}"
          if [ "${PUBLIC_IP:-none}" != "none" ] && [ -n "$PUBLIC_IP" ]; then
            echo "WARNING: Jumpbox has a public IP — this should not happen"
            exit 1
          fi
          echo "Verified: Jumpbox has no public IP (Bastion-only access)"

      - name: Scenario 3 — Break-glass via Management Plane
        run: |
          echo "=== Break-glass: az vm run-command (bypasses NSG/SSH restrictions) ==="
          az vm run-command invoke \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.AZURE_VM1 }} \
            --command-id RunShellScript \
            --scripts "
              echo '=== Break-glass access via Azure Management Plane ==='
              echo 'Host:' \$(hostname)
              echo 'App process:'
              pm2 list --no-color 2>/dev/null || echo 'pm2 not available'
              echo 'Port 3000 listening:'
              ss -tlnp | grep :3000 || echo 'not listening'
              echo 'No SSH port required — Management Plane only'
            " \
            --query "value[0].message" --output tsv

      - name: E2E result summary
        run: |
          LB_IP="${{ needs.setup-lb.outputs.lb_ip }}"
          VM1_IP="${{ needs.setup-vm1.outputs.vm1_ip }}"
          JUMPBOX_IP="${{ needs.setup-jumpbox.outputs.jumpbox_private_ip }}"
          echo ""
          echo "=================================================="
          echo "  E2E TEST PASSED — Hub-Spoke Architecture"
          echo "=================================================="
          echo "  [Network: Hub-Spoke VNet Peering]"
          echo "  Hub VNet   : ${{ env.HUB_VNET_NAME }} (${{ env.HUB_VNET_PREFIX }})"
          echo "    AzureBastionSubnet: ${{ env.BASTION_PREFIX }}"
          echo "    mgmt-snet         : ${{ env.MGMT_PREFIX }} (Jumpbox)"
          echo "  Spoke VNet : ${{ env.SPOKE_VNET_NAME }} (${{ env.SPOKE_VNET_PREFIX }})"
          echo "    web-snet          : ${{ env.WEB_PREFIX }} (App VMs + LB)"
          echo "  Peering    : hub-to-spoke + spoke-to-hub (bidirectional)"
          echo ""
          echo "  [Serving — Spoke workload tier]"
          echo "  LB URL  : http://${LB_IP}          (port 80 → 3000)"
          echo "  VM-1    : http://${VM1_IP}:${{ env.APP_PORT }} (direct, Spoke web-snet)"
          echo "  VM-2    : (private IP, via LB only, Spoke web-snet)"
          echo ""
          echo "  [Admin Access — Hub-Spoke Zero Trust]"
          echo "  Bastion : Azure Portal → ltmsa-bastion (Hub)"
          echo "  Jumpbox : ${JUMPBOX_IP} (Hub mgmt-snet, no public IP)"
          echo "  Path 1  : Bastion (Hub) → [Peering] → App VMs (Spoke)"
          echo "  Path 2  : Bastion (Hub) → Jumpbox (Hub mgmt-snet) → [Peering] → App VMs (Spoke)"
          echo ""
          echo "  [Break-glass]"
          echo "  az vm run-command → Management Plane (no SSH port, no network path needed)"
          echo ""
          echo "  Commit  : ${{ github.sha }}"
          echo "  Env     : ${{ github.event.inputs.environment }}"
          echo "=================================================="

          echo "### E2E Test Passed — Hub-Spoke" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hub VNet | ${{ env.HUB_VNET_NAME }} (${{ env.HUB_VNET_PREFIX }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Spoke VNet | ${{ env.SPOKE_VNET_NAME }} (${{ env.SPOKE_VNET_PREFIX }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| LB URL | http://${LB_IP} |" >> $GITHUB_STEP_SUMMARY
          echo "| VM-1 (direct) | http://${VM1_IP}:${{ env.APP_PORT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Jumpbox | ${JUMPBOX_IP} (Hub mgmt-snet, Bastion-only) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Azure logout
        if: always()
        run: az logout
